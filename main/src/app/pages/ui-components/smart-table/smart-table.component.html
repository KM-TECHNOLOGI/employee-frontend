<mat-card class="cardWithShadow theme-card">
  <div class="p-6 flex justify-between items-center">
    <mat-card-title class="mb-0">{{title}}</mat-card-title>

      <button *ngIf="showAdd"
          mat-flat-button
          color="primary"
          (click)="onAddClick()">
    <mat-icon>add</mat-icon>
    Add
  </button>

    <!-- Optional Search -->
    <mat-form-field appearance="outline" class="w-64">
      <mat-label>Search</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Search..." />
    </mat-form-field>
  </div>

  <mat-card-content class="border-t border-border">
    <div class="relative overflow-auto">

      <!-- TABLE -->
      <table mat-table [dataSource]="filteredData" class="min-w-full mat-elevation-z2">

        <!-- Dynamic Columns -->
        <ng-container *ngFor="let col of displayedColumns" [matColumnDef]="col">

          <!-- Header -->
          <th mat-header-cell *matHeaderCellDef class="font-semibold text-sm bg-gray-100">
            {{ col | titlecase }}
          </th>

          <!-- Cell -->
          <td mat-cell *matCellDef="let element" class="py-3">
            {{ element[col] }}
          </td>

        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions" *ngIf="showActions">
          <th mat-header-cell *matHeaderCellDef class="text-center">Actions</th>
          <td mat-cell *matCellDef="let element" class="text-center">

            <!-- <button mat-icon-button [matMenuTriggerFor]="menu">
              <mat-icon>more_vert</mat-icon>
            </button> -->

            <!-- <mat-menu #menu="matMenu"> -->
              <button mat-menu-item (click)="onEdit(element)">
                <mat-icon>edit</mat-icon>
                <span>Edit</span>
              </button>

              <button mat-menu-item (click)="onDelete(element)">
                <mat-icon>delete</mat-icon>
                <span>Delete</span>
              </button>
            <!-- </mat-menu> -->

          </td>
        </ng-container>

        <!-- Header Row -->
        <tr mat-header-row *matHeaderRowDef="finalColumns"></tr>

        <!-- Data Row -->
        <tr mat-row *matRowDef="let row; columns: finalColumns"></tr>

        <!-- Empty State -->
        <tr *ngIf="filteredData.length === 0">
          <td [attr.colspan]="finalColumns.length" class="text-center py-6 text-gray-500">
            No data available
          </td>
        </tr>

      </table>

    </div>
  </mat-card-content>
</mat-card>
